<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutz Steam Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ──────────────────────────────────────── */
    :root {
      --bg:          #1a1c1e;
      --surface:     #22252a;
      --surface-2:   #2a2e34;
      --border:      #33383f;
      --orange:      #c47a3a;
      --orange-dim:  #a3632a;
      --orange-glow: rgba(196,122,58,.15);
      --text:        #d4cfc9;
      --text-muted:  #7a7873;
      --text-faint:  #4a4845;
      --radius:      10px;
      --transition:  .16s ease;
    }

    /* ── Reset ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    /* ── App grid ───────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 196px 1fr;
      grid-template-rows: 48px 1fr;
      height: 100vh;
    }

    /* ── Top bar ────────────────────────────────────────── */
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      gap: 8px;
    }
    .topbar-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--orange);
      flex-shrink: 0;
    }
    .topbar-title {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: .04em;
      font-family: 'DM Mono', monospace;
    }
    .topbar-title strong { color: var(--text); font-weight: 600; }

    /* ── Sidebar ────────────────────────────────────────── */
    .sidebar {
      padding: 14px 10px 10px;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
    }
    .sidebar-label {
      font-size: 9px;
      font-family: 'DM Mono', monospace;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-faint);
      padding: 2px 6px 4px;
    }

    /* ── Link card ──────────────────────────────────────── */
    .link-card {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: grab;
      transition: border-color var(--transition), background var(--transition), opacity var(--transition);
      user-select: none;
    }
    .link-card:active { cursor: grabbing; }
    .link-card-inner {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }
    .link-card-name {
      font-weight: 600;
      font-size: 12.5px;
      color: var(--orange);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-card-url {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text-faint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-card:hover { border-color: var(--orange-dim); }
    .link-card:hover .link-card-name { color: #d98d4a; }
    .link-card.dragging  { opacity: .3; border-style: dashed; }
    .link-card.drag-over { border-color: var(--orange); background: var(--orange-glow); }

    .drag-handle {
      color: var(--text-faint);
      font-size: 11px;
      cursor: grab;
      flex-shrink: 0;
      line-height: 1;
      padding: 1px 2px;
    }
    .link-card-del {
      background: none;
      border: none;
      color: var(--text-faint);
      font-size: 11px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: var(--transition);
      flex-shrink: 0;
      line-height: 1;
    }
    .link-card-del:hover { color: #c0504d; background: rgba(192,80,77,.15); }

    /* ── Add-link form ──────────────────────────────────── */
    #add-form {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px;
      background: var(--surface-2);
      border: 1px dashed var(--orange-dim);
      border-radius: var(--radius);
    }
    #add-form input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 6px 9px;
      outline: none;
      transition: border-color var(--transition);
      width: 100%;
    }
    #add-form input:focus { border-color: var(--orange); }
    #add-form input::placeholder { color: var(--text-faint); }
    .btn-row { display: flex; gap: 5px; }
    .btn-sm {
      flex: 1;
      padding: 5px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      transition: var(--transition);
      background: none;
    }
    .btn-confirm { border-color: var(--orange-dim); color: var(--orange); background: var(--orange-glow); }
    .btn-confirm:hover { background: rgba(196,122,58,.28); }
    .btn-cancel  { color: var(--text-muted); }
    .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }

    #add-link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 8px;
      background: none;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-faint);
      font-size: 10.5px;
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      transition: var(--transition);
    }
    #add-link-btn:hover { border-color: var(--orange-dim); color: var(--orange); }
    .hidden { display: none !important; }

    /* ── Main area ──────────────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 14px;
      padding: 14px;
      overflow: hidden;
    }

    /* ── Notes section (search fixed + notes scroll) ───── */
    .notes-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
      height: 100%;
    }

    /* ── Search bar ─────────────────────────────────────── */
    .search-bar {
      display: flex;
      gap: 7px;
      flex-shrink: 0;
    }
    .search-bar input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 9px 14px;
      outline: none;
      transition: border-color var(--transition);
      caret-color: var(--orange);
    }
    .search-bar input:focus { border-color: var(--orange-dim); }
    .search-bar input::placeholder { color: var(--text-faint); }
    .search-bar button {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 9px 14px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .search-bar button:hover {
      border-color: var(--orange-dim);
      color: var(--orange);
      background: var(--orange-glow);
    }

    /* ── Notepads scroll area ───────────────────────────── */
    .notepads-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      padding-right: 3px;
    }

    /* ── Notepad ────────────────────────────────────────── */
    .notepad {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      flex: 1;
      min-height: 0;
    }
    .notepad-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .notepad-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--orange);
      flex-shrink: 0;
      opacity: .65;
    }
    .note-title-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      outline: none;
      caret-color: var(--orange);
    }
    .note-title-input::placeholder { color: var(--text-faint); }
    .note-body-textarea {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11.5px;
      line-height: 1.75;
      padding: 10px 13px;
      resize: none;
      outline: none;
      caret-color: var(--orange);
      min-height: 0;
    }
    .note-body-textarea::placeholder { color: var(--text-faint); }
    .notepad-footer {
      padding: 5px 13px;
      border-top: 1px solid var(--border);
      font-size: 9px;
      font-family: 'DM Mono', monospace;
      color: var(--text-faint);
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .save-status.flash { color: var(--orange); }

    /* ── Right panel ────────────────────────────────────── */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }
    .widget-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      flex-shrink: 0;
    }
    .widget-title {
      font-size: 8px;
      font-family: 'DM Mono', monospace;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 9px;
    }
    .clock {
      font-family: 'DM Mono', monospace;
      font-size: 24px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: .03em;
      line-height: 1;
    }
    .clock-date {
      font-size: 9.5px;
      color: var(--text-muted);
      margin-top: 5px;
      font-family: 'DM Mono', monospace;
    }
    .quick-links {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .quick-link {
      display: block;
      padding: 5px 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 10px;
      color: var(--text-muted);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      transition: var(--transition);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .quick-link:hover { border-color: var(--orange-dim); color: var(--orange); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-dot"></div>
    <div class="topbar-title"><strong>Tutz</strong> Steam Home</div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label">Links</div>
    <!-- link cards injected by JS -->
    <div id="add-form" class="hidden">
      <input id="form-name" type="text" placeholder="Nome (ex: HLTV)" />
      <input id="form-url"  type="text" placeholder="URL (ex: https://hltv.org)" />
      <div class="btn-row">
        <button class="btn-sm btn-confirm" id="form-confirm">+ Salvar</button>
        <button class="btn-sm btn-cancel"  id="form-cancel">Cancelar</button>
      </div>
    </div>
    <button id="add-link-btn">＋ Novo link</button>
  </nav>

  <!-- MAIN -->
  <main class="main">
    <div class="notes-section">
      <div class="search-bar">
        <input id="search-input" type="text" placeholder="Pesquisar no Google…" autocomplete="off" />
        <button id="search-btn">Buscar →</button>
      </div>
      <div class="notepads-col" id="notepads-col"></div>
    </div>

    <aside class="right-panel">
      <div class="widget-card">
        <div class="widget-title">Hora local</div>
        <div class="clock"      id="clock">00:00:00</div>
        <div class="clock-date" id="clock-date">–</div>
      </div>
      <div class="widget-card">
        <div class="widget-title">Referência rápida</div>
        <div class="quick-links">
          <a class="quick-link" href="https://hltv.org"                     target="_blank">HLTV</a>
          <a class="quick-link" href="https://liquipedia.net/counterstrike"  target="_blank">Liquipedia CS</a>
          <a class="quick-link" href="https://csstats.gg"                   target="_blank">csstats.gg</a>
          <a class="quick-link" href="https://tracker.gg/cs2"               target="_blank">Tracker.gg CS2</a>
          <a class="quick-link" href="https://prosettings.net/cs2"          target="_blank">ProSettings CS2</a>
          <a class="quick-link" href="https://github.com"                   target="_blank">GitHub</a>
        </div>
      </div>
    </aside>
  </main>
</div>

<script>
/* ══════════════════════════════════════════════
   LINKS
══════════════════════════════════════════════ */
const DEFAULT_LINKS = [
  { name: 'Youtube',         url: 'https://youtube.com'            },
  { name: 'CSNades',         url: 'https://csnades.gg'             },
  { name: 'CSRep',           url: 'https://csrep.gg'               },
  { name: 'Steam Store',     url: 'https://store.steampowered.com' },
  { name: 'Steam Community', url: 'https://steamcommunity.com'     },
  { name: 'FACEIT',          url: 'https://faceit.com'             },
  { name: 'Leetify',         url: 'https://leetify.com'            },
];

let links = JSON.parse(localStorage.getItem('sh_links') || 'null') || DEFAULT_LINKS;

const sidebar  = document.getElementById('sidebar');
const addForm  = document.getElementById('add-form');
const addBtn   = document.getElementById('add-link-btn');
const formName = document.getElementById('form-name');
const formUrl  = document.getElementById('form-url');

let dragSrcIdx = null;

function saveLinks() { localStorage.setItem('sh_links', JSON.stringify(links)); }

function renderLinks() {
  sidebar.querySelectorAll('.link-card').forEach(el => el.remove());

  links.forEach((link, idx) => {
    const el = document.createElement('div');
    el.className   = 'link-card';
    el.draggable   = true;
    el.dataset.idx = idx;
    el.innerHTML   = `
      <span class="drag-handle" title="Reordenar">⠿</span>
      <div class="link-card-inner" data-url="${escAttr(link.url)}">
        <span class="link-card-name">${escHtml(link.name)}</span>
        <span class="link-card-url">${escHtml(link.url.replace(/^https?:\/\//, ''))}</span>
      </div>
      <button class="link-card-del" title="Remover">✕</button>
    `;

    el.addEventListener('dragstart', e => {
      dragSrcIdx = idx;
      setTimeout(() => el.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      sidebar.querySelectorAll('.link-card').forEach(c => c.classList.remove('drag-over'));
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      sidebar.querySelectorAll('.link-card').forEach(c => c.classList.remove('drag-over'));
      el.classList.add('drag-over');
    });
    el.addEventListener('drop', e => {
      e.preventDefault();
      const targetIdx = +el.dataset.idx;
      if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
      const [moved] = links.splice(dragSrcIdx, 1);
      links.splice(targetIdx, 0, moved);
      saveLinks();
      renderLinks();
    });

    el.querySelector('.link-card-inner').addEventListener('click', e => {
      e.stopPropagation();
      window.location.href = link.url;
    });

    el.querySelector('.link-card-del').addEventListener('click', e => {
      e.stopPropagation();
      links.splice(idx, 1);
      saveLinks();
      renderLinks();
    });

    sidebar.insertBefore(el, addForm);
  });
}

addBtn.addEventListener('click', () => {
  addForm.classList.remove('hidden');
  addBtn.classList.add('hidden');
  formName.focus();
});
document.getElementById('form-cancel').addEventListener('click', () => {
  addForm.classList.add('hidden');
  addBtn.classList.remove('hidden');
  formName.value = formUrl.value = '';
});
document.getElementById('form-confirm').addEventListener('click', () => {
  const name = formName.value.trim();
  let   url  = formUrl.value.trim();
  if (!name || !url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  links.push({ name, url });
  saveLinks();
  renderLinks();
  formName.value = formUrl.value = '';
  addForm.classList.add('hidden');
  addBtn.classList.remove('hidden');
});

/* ══════════════════════════════════════════════
   NOTEPADS — 3 independent
══════════════════════════════════════════════ */
const NOTES = [
  { id: 'note1', ph: 'Escreva aqui…'  },
  { id: 'note2', ph: 'Segunda nota…'  },
  { id: 'note3', ph: 'Terceira nota…' },
];

const col = document.getElementById('notepads-col');

NOTES.forEach(cfg => {
  const wrap = document.createElement('div');
  wrap.className = 'notepad';
  wrap.innerHTML = `
    <div class="notepad-header">
      <div class="notepad-dot"></div>
      <input class="note-title-input" type="text"
             placeholder="Título…" spellcheck="false"
             value="${escAttr(localStorage.getItem(cfg.id + '_title') || '')}" />
    </div>
    <textarea class="note-body-textarea"
              placeholder="${escAttr(cfg.ph)}"
              spellcheck="false"></textarea>
    <div class="notepad-footer">
      <span class="save-status">salvo</span>
      <span class="char-count">0 chars</span>
    </div>
  `;

  const titleEl  = wrap.querySelector('.note-title-input');
  const bodyEl   = wrap.querySelector('.note-body-textarea');
  const statusEl = wrap.querySelector('.save-status');
  const countEl  = wrap.querySelector('.char-count');

  // restore body (set via property to avoid HTML escaping issues)
  bodyEl.value = localStorage.getItem(cfg.id + '_body') || '';
  countEl.textContent = bodyEl.value.length + ' chars';

  let timer;
  function scheduleSave() {
    clearTimeout(timer);
    statusEl.textContent = 'digitando…';
    statusEl.classList.remove('flash');
    timer = setTimeout(() => {
      localStorage.setItem(cfg.id + '_title', titleEl.value);
      localStorage.setItem(cfg.id + '_body',  bodyEl.value);
      statusEl.textContent = 'salvo';
      statusEl.classList.add('flash');
      setTimeout(() => statusEl.classList.remove('flash'), 1400);
    }, 700);
  }

  titleEl.addEventListener('input', scheduleSave);
  bodyEl.addEventListener('input', () => {
    countEl.textContent = bodyEl.value.length + ' chars';
    scheduleSave();
  });

  col.appendChild(wrap);
});

/* ══════════════════════════════════════════════
   SEARCH
══════════════════════════════════════════════ */
function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
}
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
document.getElementById('search-btn').addEventListener('click', doSearch);

/* ══════════════════════════════════════════════
   CLOCK
══════════════════════════════════════════════ */
function pad(n) { return String(n).padStart(2, '0'); }
function tickClock() {
  const now    = new Date();
  const days   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('clock').textContent =
    pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  document.getElementById('clock-date').textContent =
    days[now.getDay()] + ' · ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
}
setInterval(tickClock, 1000);
tickClock();

/* ── Helpers ── */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── Init ── */
renderLinks();
</script>
</body>
</html>
