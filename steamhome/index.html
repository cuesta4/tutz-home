<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <meta name="tutz-build" content="steamhome-port-v1" />
  <title>Tutz Steam Home</title>
  <style>
    :root {
      --bg: #0d1014;
      --surface: #15191e;
      --surface-2: #1b2027;
      --surface-3: #242b34;
      --border: rgba(216, 225, 235, .10);
      --border-strong: rgba(216, 225, 235, .18);
      --text: #e8edf2;
      --muted: #a0aab5;
      --faint: #707b87;
      --accent: #d88643;
      --accent-strong: #ed9b57;
      --accent-soft: rgba(216, 134, 67, .12);
      --danger: #cf7777;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 16px 48px rgba(0, 0, 0, .16);
      --transition: 140ms ease;
      --mono: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
    }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }
    .hidden { display: none !important; }

    .app {
      width: min(1480px, calc(100% - 32px));
      margin: 18px auto;
    }

    .topbar,
    .panel {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      min-height: 58px;
      display: grid;
      grid-template-columns: auto minmax(220px, 660px);
      align-items: center;
      gap: 28px;
      padding: 10px 14px 10px 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      white-space: nowrap;
      color: var(--muted);
    }
    .brand-dot,
    .section-dot {
      width: 8px;
      height: 8px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px rgba(216, 134, 67, .25);
    }
    .brand strong { color: var(--accent-strong); font-weight: 700; }

    .search {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 9px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      background: var(--surface-2);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }
    input { min-height: 38px; padding: 0 11px; }
    textarea { min-height: 310px; resize: vertical; padding: 12px; line-height: 1.6; }
    input:focus,
    textarea:focus {
      border-color: rgba(216, 134, 67, .75);
      box-shadow: 0 0 0 3px var(--accent-soft);
      background: #1d232b;
    }
    input::placeholder,
    textarea::placeholder { color: var(--faint); }

    .btn,
    .icon-btn,
    .add-btn {
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      transition: color var(--transition), border-color var(--transition), background var(--transition), transform var(--transition);
    }
    .btn:hover,
    .icon-btn:hover,
    .add-btn:hover {
      color: var(--accent-strong);
      border-color: rgba(216, 134, 67, .62);
      background: var(--accent-soft);
    }
    .btn:active,
    .icon-btn:active,
    .add-btn:active { transform: translateY(1px); }
    .btn { min-height: 38px; padding: 0 13px; font-weight: 700; font-size: 12px; }
    .btn-primary { color: #ffd1a6; border-color: rgba(216, 134, 67, .52); background: var(--accent-soft); }
    .btn-danger:hover { color: #f6aaaa; border-color: rgba(207, 119, 119, .7); background: rgba(207, 119, 119, .10); }
    .icon-btn { display: inline-grid; place-items: center; width: 27px; height: 27px; padding: 0; font-family: var(--mono); font-size: 12px; }

    .layout {
      display: grid;
      grid-template-columns: minmax(230px, 280px) minmax(360px, 1fr) minmax(220px, 250px);
      grid-template-areas: "links scratch widgets";
      gap: 14px;
      align-items: start;
      margin-top: 14px;
    }

    .panel { min-width: 0; overflow: hidden; }
    .links-panel { grid-area: links; }
    .scratch-panel { grid-area: scratch; }
    .widgets { grid-area: widgets; display: grid; gap: 14px; min-width: 0; }

    .panel-head {
      min-height: 45px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 13px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      color: #9eb3c9;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    .section-dot { width: 6px; height: 6px; }

    .panel-body { padding: 11px; }

    .list { display: grid; gap: 6px; }

    .shortcut,
    .quick-ref {
      position: relative;
      display: grid;
      align-items: center;
      gap: 7px;
      min-width: 0;
      border: 1px solid var(--border);
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      transition: border-color var(--transition), background var(--transition), opacity var(--transition), transform var(--transition);
    }
    .shortcut { grid-template-columns: minmax(0, 1fr) auto; min-height: 52px; padding: 7px 7px 7px 10px; }
    .quick-ref { grid-template-columns: minmax(0, 1fr) auto; min-height: 34px; padding: 4px 5px 4px 9px; }
    .shortcut:hover,
    .quick-ref:hover { border-color: rgba(216, 134, 67, .54); background: #1e252d; }
    .shortcut.dragging,
    .quick-ref.dragging { opacity: .42; }
    .shortcut.drag-over,
    .quick-ref.drag-over { border-color: var(--accent-strong); transform: translateY(2px); }

    .shortcut-link,
    .quick-ref-link {
      min-width: 0;
      text-decoration: none;
      overflow: hidden;
    }
    .shortcut-name {
      display: block;
      overflow: hidden;
      color: #f1bd87;
      font-weight: 700;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .shortcut-url {
      display: block;
      overflow: hidden;
      margin-top: 4px;
      color: #8396aa;
      font-family: var(--mono);
      font-size: 9px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .quick-ref-link {
      color: #a8bbce;
      font-family: var(--mono);
      font-size: 10px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .quick-ref-link:hover { color: var(--accent-strong); }

    .item-actions {
      display: flex;
      gap: 3px;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .shortcut:hover .item-actions,
    .shortcut:focus-within .item-actions,
    .quick-ref:hover .item-actions,
    .quick-ref:focus-within .item-actions { opacity: 1; }
    .drag-btn { cursor: grab; }
    .drag-btn:active { cursor: grabbing; }

    .add-btn {
      width: 100%;
      min-height: 37px;
      margin-top: 8px;
      border-style: dashed;
      color: #8793a0;
      font-size: 11px;
    }

    .inline-form {
      display: grid;
      gap: 7px;
      margin-top: 8px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(27, 32, 39, .72);
    }
    .inline-form input { min-height: 34px; font-size: 12px; }
    .form-actions { display: flex; gap: 7px; }
    .form-actions .btn { min-height: 32px; padding: 0 10px; font-size: 11px; }

    .scratch-wrap { padding: 11px; }
    .scratch-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 7px;
      color: #73869a;
      font-family: var(--mono);
      font-size: 9px;
    }
    .saved.flash { color: var(--accent-strong); }

    .clock {
      padding: 12px 12px 13px;
      color: #f1f4f7;
      font-family: var(--mono);
      font-size: clamp(23px, 3vw, 30px);
      letter-spacing: .03em;
      white-space: nowrap;
    }
    .clock-date {
      margin-top: 7px;
      color: #8396aa;
      font-size: 9px;
      letter-spacing: .05em;
    }

    .empty {
      padding: 8px 3px 4px;
      color: var(--faint);
      font-family: var(--mono);
      font-size: 10px;
    }

    @media (max-width: 1040px) {
      .app { width: min(940px, calc(100% - 24px)); margin-top: 12px; }
      .layout {
        grid-template-columns: minmax(210px, 260px) minmax(340px, 1fr);
        grid-template-areas:
          "links scratch"
          "widgets scratch";
      }
      .widgets { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .app { width: min(620px, calc(100% - 16px)); margin: 8px auto; }
      .topbar { grid-template-columns: 1fr; gap: 9px; padding: 11px; }
      .layout {
        grid-template-columns: 1fr;
        grid-template-areas:
          "links"
          "scratch"
          "widgets";
        gap: 10px;
        margin-top: 10px;
      }
      .widgets { gap: 10px; }
      textarea { min-height: 220px; }
      .item-actions { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><span class="brand-dot"></span><span><strong>Tutz</strong> Steam Home</span></div>
      <form class="search" id="search-form" role="search">
        <input id="search-input" type="search" autocomplete="off" placeholder="Pesquisar no Google..." aria-label="Pesquisar no Google" />
        <button class="btn btn-primary" type="submit">Pesquisar</button>
      </form>
    </header>

    <main class="layout">
      <section class="panel links-panel" aria-labelledby="links-title">
        <header class="panel-head">
          <div class="panel-title" id="links-title"><span class="section-dot"></span>Links</div>
        </header>
        <div class="panel-body">
          <div class="list" id="shortcuts-list"></div>
          <button class="add-btn" id="shortcut-add-open" type="button">+ Novo link</button>
          <form class="inline-form hidden" id="shortcut-form">
            <input id="shortcut-name" type="text" maxlength="48" placeholder="Nome" autocomplete="off" required />
            <input id="shortcut-url" type="text" maxlength="512" placeholder="URL" autocomplete="off" required />
            <div class="form-actions">
              <button class="btn btn-primary" type="submit">Salvar</button>
              <button class="btn" id="shortcut-add-cancel" type="button">Cancelar</button>
            </div>
          </form>
        </div>
      </section>

      <section class="panel scratch-panel" aria-labelledby="scratch-title">
        <header class="panel-head">
          <div class="panel-title" id="scratch-title"><span class="section-dot"></span>Rascunho local</div>
        </header>
        <div class="scratch-wrap">
          <textarea id="scratch" spellcheck="true" placeholder="Notas temporárias salvas apenas neste navegador..."></textarea>
          <div class="scratch-meta">
            <span class="saved" id="scratch-status">salvo localmente</span>
            <span id="scratch-count">0 caracteres</span>
          </div>
        </div>
      </section>

      <aside class="widgets">
        <section class="panel" aria-labelledby="clock-title">
          <header class="panel-head"><div class="panel-title" id="clock-title">Hora local</div></header>
          <div class="clock"><div id="clock">00:00:00</div><div class="clock-date" id="clock-date">–</div></div>
        </section>

        <section class="panel" aria-labelledby="quick-title">
          <header class="panel-head"><div class="panel-title" id="quick-title">Referência rápida</div></header>
          <div class="panel-body">
            <div class="list" id="quick-list"></div>
            <button class="add-btn" id="quick-add-open" type="button">+ Adicionar referência</button>
            <form class="inline-form hidden" id="quick-form">
              <input id="quick-name" type="text" maxlength="48" placeholder="Título exibido" autocomplete="off" required />
              <input id="quick-url" type="text" maxlength="512" placeholder="URL" autocomplete="off" required />
              <div class="form-actions">
                <button class="btn btn-primary" type="submit">Salvar</button>
                <button class="btn" id="quick-add-cancel" type="button">Cancelar</button>
              </div>
            </form>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <script>
    (() => {
      'use strict';

      const DEFAULT_SHORTCUTS = [
        { name: 'YouTube', url: 'https://youtube.com' },
        { name: 'CSNades', url: 'https://csnades.gg' },
        { name: 'CSRep', url: 'https://csrep.gg' },
        { name: 'Steam Store', url: 'https://store.steampowered.com' },
        { name: 'Steam Community', url: 'https://steamcommunity.com' },
        { name: 'FACEIT', url: 'https://faceit.com' },
        { name: 'Leetify', url: 'https://leetify.com' }
      ];

      const DEFAULT_QUICK_REFS = [
        { name: 'HLTV', url: 'https://hltv.org' },
        { name: 'Liquipedia CS', url: 'https://liquipedia.net/counterstrike' },
        { name: 'csstats.gg', url: 'https://csstats.gg' },
        { name: 'Tracker.gg CS2', url: 'https://tracker.gg/cs2' },
        { name: 'ProSettings CS2', url: 'https://prosettings.net/cs2' },
        { name: 'GitHub', url: 'https://github.com' }
      ];

      const storage = {
        get(key, fallback = null) {
          try {
            const value = localStorage.getItem(key);
            return value === null ? fallback : value;
          } catch { return fallback; }
        },
        set(key, value) {
          try { localStorage.setItem(key, value); return true; }
          catch { return false; }
        }
      };

      const $ = id => document.getElementById(id);

      function clone(value) { return JSON.parse(JSON.stringify(value)); }
      function readJson(key, fallback) {
        try {
          const parsed = JSON.parse(storage.get(key, 'null'));
          return Array.isArray(parsed) ? parsed : clone(fallback);
        } catch { return clone(fallback); }
      }
      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, char => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        })[char]);
      }
      function validUrl(value) {
        let normalized = String(value || '').trim();
        if (!normalized) return null;
        if (!/^https?:\/\//i.test(normalized)) normalized = 'https://' + normalized;
        try {
          const parsed = new URL(normalized);
          if (!/^https?:$/.test(parsed.protocol)) return null;
          return parsed.href;
        } catch { return null; }
      }
      function displayUrl(value) {
        try {
          const parsed = new URL(value);
          return (parsed.host + parsed.pathname).replace(/\/$/, '') || parsed.host;
        } catch { return String(value).replace(/^https?:\/\//i, '').replace(/\/$/, ''); }
      }
      function setFormVisible(form, openButton, visible, focusTarget) {
        form.classList.toggle('hidden', !visible);
        openButton.classList.toggle('hidden', visible);
        if (visible && focusTarget) focusTarget.focus();
      }
      function resetForm(form) { form.reset(); }

      let shortcuts = readJson('sh_links', DEFAULT_SHORTCUTS);
      let quickRefs = readJson('sh_quick_refs', DEFAULT_QUICK_REFS);

      const shortcutsList = $('shortcuts-list');
      const quickList = $('quick-list');

      function persistShortcuts() { storage.set('sh_links', JSON.stringify(shortcuts)); }
      function persistQuickRefs() { storage.set('sh_quick_refs', JSON.stringify(quickRefs)); }

      function makeActions(onDelete) {
        const actions = document.createElement('span');
        actions.className = 'item-actions';

        const drag = document.createElement('button');
        drag.className = 'icon-btn drag-btn';
        drag.type = 'button';
        drag.title = 'Arrastar para reordenar';
        drag.setAttribute('aria-label', 'Arrastar para reordenar');
        drag.textContent = '⋮⋮';

        const remove = document.createElement('button');
        remove.className = 'icon-btn btn-danger';
        remove.type = 'button';
        remove.title = 'Excluir';
        remove.setAttribute('aria-label', 'Excluir');
        remove.textContent = '×';
        remove.addEventListener('click', event => {
          event.preventDefault();
          event.stopPropagation();
          onDelete();
        });

        actions.append(drag, remove);
        return actions;
      }

      function enableReorder(element, list, index, save, render) {
        element.draggable = true;
        element.addEventListener('dragstart', event => {
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', String(index));
          element.classList.add('dragging');
        });
        element.addEventListener('dragend', () => {
          element.classList.remove('dragging');
          document.querySelectorAll('.drag-over').forEach(item => item.classList.remove('drag-over'));
        });
        element.addEventListener('dragover', event => {
          event.preventDefault();
          element.classList.add('drag-over');
        });
        element.addEventListener('dragleave', () => element.classList.remove('drag-over'));
        element.addEventListener('drop', event => {
          event.preventDefault();
          element.classList.remove('drag-over');
          const source = Number(event.dataTransfer.getData('text/plain'));
          if (!Number.isInteger(source) || source === index || source < 0 || source >= list.length) return;
          const [moved] = list.splice(source, 1);
          list.splice(index, 0, moved);
          save();
          render();
        });
      }

      function renderShortcuts() {
        shortcutsList.replaceChildren();
        if (!shortcuts.length) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'Nenhum link salvo.';
          shortcutsList.append(empty);
          return;
        }
        shortcuts.forEach((shortcut, index) => {
          const card = document.createElement('div');
          card.className = 'shortcut';

          const link = document.createElement('a');
          link.className = 'shortcut-link';
          link.href = shortcut.url;
          link.innerHTML = `<span class="shortcut-name">${escapeHtml(shortcut.name)}</span><span class="shortcut-url">${escapeHtml(displayUrl(shortcut.url))}</span>`;

          const actions = makeActions(() => {
            shortcuts.splice(index, 1);
            persistShortcuts();
            renderShortcuts();
          });

          card.append(link, actions);
          enableReorder(card, shortcuts, index, persistShortcuts, renderShortcuts);
          shortcutsList.append(card);
        });
      }

      function renderQuickRefs() {
        quickList.replaceChildren();
        if (!quickRefs.length) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'Nenhuma referência salva.';
          quickList.append(empty);
          return;
        }
        quickRefs.forEach((reference, index) => {
          const item = document.createElement('div');
          item.className = 'quick-ref';

          const link = document.createElement('a');
          link.className = 'quick-ref-link';
          link.href = reference.url;
          link.target = '_blank';
          link.rel = 'noopener';
          link.textContent = reference.name;

          const actions = makeActions(() => {
            quickRefs.splice(index, 1);
            persistQuickRefs();
            renderQuickRefs();
          });

          item.append(link, actions);
          enableReorder(item, quickRefs, index, persistQuickRefs, renderQuickRefs);
          quickList.append(item);
        });
      }

      function configureInlineForm({ openId, formId, cancelId, nameId, urlId, onSubmit }) {
        const open = $(openId);
        const form = $(formId);
        const cancel = $(cancelId);
        const name = $(nameId);
        const url = $(urlId);

        open.addEventListener('click', () => setFormVisible(form, open, true, name));
        cancel.addEventListener('click', () => {
          resetForm(form);
          setFormVisible(form, open, false);
        });
        form.addEventListener('submit', event => {
          event.preventDefault();
          const normalized = validUrl(url.value);
          const title = name.value.trim();
          if (!title || !normalized) {
            url.focus();
            return;
          }
          onSubmit({ name: title, url: normalized });
          resetForm(form);
          setFormVisible(form, open, false);
        });
      }

      configureInlineForm({
        openId: 'shortcut-add-open', formId: 'shortcut-form', cancelId: 'shortcut-add-cancel',
        nameId: 'shortcut-name', urlId: 'shortcut-url',
        onSubmit(item) { shortcuts.push(item); persistShortcuts(); renderShortcuts(); }
      });

      configureInlineForm({
        openId: 'quick-add-open', formId: 'quick-form', cancelId: 'quick-add-cancel',
        nameId: 'quick-name', urlId: 'quick-url',
        onSubmit(item) { quickRefs.push(item); persistQuickRefs(); renderQuickRefs(); }
      });

      const scratch = $('scratch');
      const scratchStatus = $('scratch-status');
      const scratchCount = $('scratch-count');
      const previousNote = storage.get('note1_body', '');
      scratch.value = storage.get('sh_scratch', previousNote || '');
      scratchCount.textContent = `${scratch.value.length} caracteres`;
      let scratchTimer = null;
      scratch.addEventListener('input', () => {
        scratchCount.textContent = `${scratch.value.length} caracteres`;
        scratchStatus.textContent = 'digitando...';
        scratchStatus.classList.remove('flash');
        clearTimeout(scratchTimer);
        scratchTimer = setTimeout(() => {
          storage.set('sh_scratch', scratch.value);
          scratchStatus.textContent = 'salvo localmente';
          scratchStatus.classList.add('flash');
          setTimeout(() => scratchStatus.classList.remove('flash'), 900);
        }, 350);
      });

      $('search-form').addEventListener('submit', event => {
        event.preventDefault();
        const query = $('search-input').value.trim();
        if (query) location.href = 'https://www.google.com/search?q=' + encodeURIComponent(query);
      });

      const pad = value => String(value).padStart(2, '0');
      function updateClock() {
        const now = new Date();
        const days = ['dom.', 'seg.', 'ter.', 'qua.', 'qui.', 'sex.', 'sáb.'];
        const months = ['jan.', 'fev.', 'mar.', 'abr.', 'mai.', 'jun.', 'jul.', 'ago.', 'set.', 'out.', 'nov.', 'dez.'];
        $('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        $('clock-date').textContent = `${days[now.getDay()]} · ${pad(now.getDate())} ${months[now.getMonth()]} ${now.getFullYear()}`;
      }

      renderShortcuts();
      renderQuickRefs();
      updateClock();
      setInterval(updateClock, 1000);
    })();
  </script>
</body>
</html>
